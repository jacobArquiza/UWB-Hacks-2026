<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>RoRadar Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      color-scheme: dark;
      --rr-bg-top: #171a21;
      --rr-bg-bottom: #11141b;
      --rr-card: rgba(22, 25, 33, 0.9);
      --rr-card-strong: rgba(16, 19, 26, 0.98);
      --rr-card-soft: rgba(255, 255, 255, 0.028);
      --rr-card-soft-2: rgba(255, 255, 255, 0.04);
      --rr-surface: rgba(33, 37, 48, 0.86);
      --rr-surface-2: rgba(22, 25, 33, 0.94);
      --rr-border: rgba(255, 255, 255, 0.08);
      --rr-border-strong: rgba(255, 255, 255, 0.14);
      --rr-text: #f3f3f4;
      --rr-text-soft: #a6a8ad;
      --rr-text-muted: rgba(198, 201, 207, 0.78);
      --rr-primary: #2850ff;
      --rr-success: #59d89d;
      --rr-glow-a: rgba(63, 92, 255, 0.14);
      --rr-glow-b: rgba(255, 255, 255, 0.04);
      --rr-glow-c: rgba(73, 104, 255, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family:
        "Inter",
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background:
        radial-gradient(circle at top, var(--rr-glow-a), transparent 26rem),
        linear-gradient(180deg, var(--rr-bg-top) 0%, var(--rr-bg-bottom) 100%);
      color: var(--rr-text);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 0;
      background:
        radial-gradient(circle at 14% 18%, var(--rr-glow-c), transparent 16rem),
        radial-gradient(circle at 80% 0%, var(--rr-glow-b), transparent 14rem);
      filter: blur(16px);
    }

    body::after {
      z-index: 0;
      opacity: 0.42;
      background-image:
        linear-gradient(
          to right,
          transparent 0,
          transparent calc(25% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(25% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(25% + 0.5px),
          transparent calc(25% + 0.5px),
          transparent calc(50% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(50% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(50% + 0.5px),
          transparent calc(50% + 0.5px),
          transparent calc(75% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(75% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(75% + 0.5px),
          transparent calc(75% + 0.5px)
        ),
        linear-gradient(
          to bottom,
          transparent 0,
          transparent calc(24% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(24% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(24% + 0.5px),
          transparent calc(24% + 0.5px),
          transparent calc(50% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(50% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(50% + 0.5px),
          transparent calc(50% + 0.5px),
          transparent calc(76% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(76% - 0.5px),
          rgba(255, 255, 255, 0.04) calc(76% + 0.5px),
          transparent calc(76% + 0.5px)
        );
    }

    .rr-brand-bar {
      position: fixed;
      top: 28px;
      left: 50%;
      z-index: 2;
      width: min(92vw, 1180px);
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border: 1px solid var(--rr-border);
      border-radius: 28px;
      background: rgba(26, 29, 36, 0.88);
      backdrop-filter: blur(18px);
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.16);
    }

    .rr-brand-lockup {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .rr-brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .rr-brand-wordmark {
      height: 26px;
      width: auto;
      display: block;
    }

    .rr-brand-copy {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--rr-text-soft);
      font-size: 0.92rem;
    }

    .rr-brand-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.6rem 0.95rem;
      border-radius: 999px;
      border: 1px solid var(--rr-border);
      background: rgba(255, 255, 255, 0.03);
    }

    .rr-ambient-copy {
      position: fixed;
      left: max(36px, calc(50vw - 640px));
      bottom: 48px;
      z-index: 1;
      max-width: 420px;
      padding: 0 6px;
      color: var(--rr-text-soft);
    }

    .rr-ambient-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #9db2ff;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-weight: 700;
      font-size: 0.68rem;
    }

    .rr-ambient-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--rr-success);
      box-shadow: 0 0 0 8px rgba(89, 216, 157, 0.08);
    }

    .rr-ambient-copy h1 {
      margin: 18px 0 0;
      max-width: 10ch;
      font-size: clamp(2.8rem, 5vw, 4.6rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
      font-weight: 800;
      color: var(--rr-text);
    }

    .rr-ambient-copy p {
      margin: 18px 0 0;
      font-size: 0.98rem;
      line-height: 1.8;
    }

    .auth0-lock.auth0-lock .auth0-lock-overlay {
      background:
        radial-gradient(circle at top, rgba(63, 92, 255, 0.08), transparent 22rem),
        rgba(15, 18, 24, 0.58);
    }

    .auth0-lock.auth0-lock {
      font-family: inherit;
    }

    .auth0-lock.auth0-lock .auth0-lock-widget {
      width: min(100%, 420px);
      border: 1px solid var(--rr-border);
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(53, 91, 255, 0.09), transparent 11rem),
        linear-gradient(180deg, rgba(23, 26, 35, 0.98) 0%, rgba(15, 18, 24, 1) 100%);
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.42),
        0 14px 36px rgba(14, 18, 32, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .auth0-lock.auth0-lock .auth0-lock-widget-container {
      background: transparent;
      font-family: inherit;
    }

    .auth0-lock.auth0-lock .auth0-lock-header {
      background:
        radial-gradient(circle at top, rgba(53, 91, 255, 0.16), transparent 10rem),
        linear-gradient(180deg, rgba(33, 37, 48, 0.94) 0%, rgba(21, 24, 32, 0.98) 100%);
      padding-top: 26px;
      box-shadow:
        inset 0 -1px 0 rgba(255, 255, 255, 0.05),
        inset 0 -30px 50px rgba(0, 0, 0, 0.08);
    }

    .auth0-lock.auth0-lock .auth0-lock-header-bg {
      background: transparent;
    }

    .auth0-lock.auth0-lock .auth0-lock-name {
      color: #f7f8fb;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.12rem;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
    }

    .auth0-lock.auth0-lock .auth0-lock-header-welcome {
      color: rgba(243, 243, 244, 0.88);
      font-family: inherit;
      font-weight: 600;
    }

    .auth0-lock.auth0-lock .auth0-lock-content {
      background:
        linear-gradient(180deg, rgba(20, 23, 31, 0.98) 0%, rgba(14, 17, 23, 1) 100%);
    }

    .auth0-lock.auth0-lock .auth0-lock-content-body {
      padding: 20px 24px 24px;
    }

    .auth0-lock.auth0-lock .auth0-lock-center,
    .auth0-lock.auth0-lock .auth0-lock-cred-pane,
    .auth0-lock.auth0-lock .auth0-lock-form,
    .auth0-lock.auth0-lock .auth0-lock-content,
    .auth0-lock.auth0-lock .auth0-lock-content-wrapper,
    .auth0-lock.auth0-lock .auth0-lock-cred-pane-internal-wrapper,
    .auth0-lock.auth0-lock .auth0-lock-body-content,
    .auth0-lock.auth0-lock .auth0-lock-pane {
      background: transparent;
    }

    .auth0-lock.auth0-lock .auth0-lock-cred-pane {
      background: transparent;
    }

    .auth0-lock.auth0-lock .auth0-lock-tabs-container {
      background: rgba(255, 255, 255, 0.015);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.03),
        inset 0 -1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
    }

    .auth0-lock.auth0-lock .auth0-lock-tabs {
      background: transparent;
    }

    .auth0-lock.auth0-lock .auth0-lock-tabs li a {
      color: rgba(176, 181, 191, 0.88);
      font-family: inherit;
      font-weight: 600;
    }

    .auth0-lock.auth0-lock .auth0-lock-tabs li.auth0-lock-tabs-current a {
      color: #f6f8ff;
    }

    .auth0-lock.auth0-lock .auth0-lock-tabs li.auth0-lock-tabs-current:after {
      background: var(--rr-primary);
      height: 3px;
      border-radius: 999px;
      box-shadow: 0 0 14px rgba(40, 80, 255, 0.35);
    }

    .auth0-lock.auth0-lock .auth0-lock-social-button {
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.018) 100%),
        rgba(20, 23, 30, 0.92);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.025),
        0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .auth0-lock.auth0-lock .auth0-lock-social-button-text {
      font-family: inherit;
      font-weight: 600;
      color: #f2f4f8;
    }

    .auth0-lock.auth0-lock .auth0-lock-social-button-icon {
      border-radius: 14px 0 0 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .auth0-lock.auth0-lock .auth0-lock-separator {
      color: rgba(166, 168, 173, 0.7);
      font-family: inherit;
    }

    .auth0-lock.auth0-lock .auth0-lock-input-wrap {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.022) 0%, rgba(255, 255, 255, 0.012) 100%),
        rgba(17, 20, 27, 0.96);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.018);
    }

    .auth0-lock.auth0-lock .auth0-lock-input-wrap.auth0-lock-focused {
      border-color: rgba(40, 80, 255, 0.58);
      box-shadow:
        0 0 0 4px rgba(40, 80, 255, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.025);
    }

    .auth0-lock.auth0-lock .auth0-lock-input-wrap .auth0-lock-input {
      color: #f4f6fb;
      background: transparent;
      font-family: inherit;
    }

    .auth0-lock.auth0-lock .auth0-lock-input-wrap .auth0-lock-input::placeholder {
      color: rgba(166, 168, 173, 0.62);
    }

    .auth0-lock.auth0-lock .auth0-lock-input-wrap .auth0-lock-input,
    .auth0-lock.auth0-lock .auth0-lock-input-wrap .auth0-lock-input:-webkit-autofill {
      -webkit-text-fill-color: var(--rr-text);
      transition: background-color 99999s ease-out, color 99999s ease-out;
    }

    .auth0-lock.auth0-lock .auth0-lock-input-wrap .auth0-lock-input-icon {
      color: rgba(166, 168, 173, 0.58);
    }

    .auth0-lock.auth0-lock .auth0-lock-alternative,
    .auth0-lock.auth0-lock .auth0-lock-alternative-link,
    .auth0-lock.auth0-lock .auth0-lock-form p,
    .auth0-lock.auth0-lock .auth0-lock-form a,
    .auth0-lock.auth0-lock .auth0-lock-bottom p,
    .auth0-lock.auth0-lock .auth0-lock-bottom a {
      color: var(--rr-text-soft);
      font-family: inherit;
    }

    .auth0-lock.auth0-lock .auth0-lock-alternative-link:hover,
    .auth0-lock.auth0-lock .auth0-lock-form a:hover,
    .auth0-lock.auth0-lock .auth0-lock-bottom a:hover {
      color: #ffffff;
    }

    .auth0-lock.auth0-lock .auth0-lock-submit {
      min-height: 54px;
      border-radius: 18px;
      background: linear-gradient(180deg, #3a61ff 0%, #2850ff 100%);
      box-shadow:
        0 14px 30px rgba(40, 80, 255, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .auth0-lock.auth0-lock .auth0-lock-submit:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .auth0-lock.auth0-lock .auth0-lock-submit span {
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .auth0-lock.auth0-lock .auth0-lock-label,
    .auth0-lock.auth0-lock .auth0-lock-global-message,
    .auth0-lock.auth0-lock .auth0-lock-error-msg,
    .auth0-lock.auth0-lock .auth0-lock-input-block label {
      color: var(--rr-text-muted);
      font-family: inherit;
    }

    .auth0-lock.auth0-lock .auth0-lock-form p,
    .auth0-lock.auth0-lock .auth0-lock-form .auth0-lock-alternative,
    .auth0-lock.auth0-lock .auth0-lock-form .auth0-lock-alternative-link,
    .auth0-lock.auth0-lock .auth0-lock-form .auth0-lock-forgot-password,
    .auth0-lock.auth0-lock .auth0-lock-form .auth0-lock-input-wrap input,
    .auth0-lock.auth0-lock .auth0-lock-form .auth0-lock-submit,
    .auth0-lock.auth0-lock .auth0-lock-form .auth0-lock-social-button {
      font-family: inherit;
    }

    .auth0-lock.auth0-lock .auth0-lock-error {
      border-radius: 18px;
    }

    .auth0-lock.auth0-lock .auth0-lock-badge-bottom {
      display: none;
    }

    @media (max-width: 960px) {
      body {
        overflow: auto;
      }

      .rr-brand-bar {
        width: calc(100vw - 24px);
        top: 12px;
        padding: 14px 16px;
        border-radius: 22px;
      }

      .rr-brand-copy {
        display: none;
      }

      .rr-ambient-copy {
        position: static;
        max-width: none;
        padding: 104px 18px 0;
        margin: 0 auto;
        text-align: center;
      }

      .rr-ambient-copy h1 {
        max-width: none;
        font-size: clamp(2.3rem, 10vw, 3.4rem);
      }

      .rr-ambient-kicker {
        justify-content: center;
      }

      .auth0-lock.auth0-lock .auth0-lock-overlay {
        padding-top: 32px;
        background:
          radial-gradient(circle at top, rgba(63, 92, 255, 0.08), transparent 22rem),
          rgba(17, 20, 27, 0.68);
      }
    }
  </style>
</head>
<body>
  <div class="rr-brand-bar" aria-hidden="true">
    <div class="rr-brand-lockup">
      <img
        class="rr-brand-mark"
        src="https://roradar.vercel.app/branding/roradar-mark.png"
        alt=""
      >
      <img
        class="rr-brand-wordmark"
        src="https://roradar.vercel.app/branding/roradar-wordmark.png"
        alt="RoRadar"
      >
    </div>

    <div class="rr-brand-copy">
      <span class="rr-brand-chip">Parental safety review</span>
      <span class="rr-brand-chip">Live Roblox account screening</span>
    </div>
  </div>

  <div class="rr-ambient-copy" aria-hidden="true">
    <div class="rr-ambient-kicker">
      <span class="rr-ambient-dot"></span>
      RoRadar access
    </div>
    <h1>Review the account before the risk spreads.</h1>
    <p>
      Sign in or create an account to save children, revisit flagged profiles,
      and keep your review history in one place.
    </p>
  </div>

  <!--[if IE 8]>
  <script src="//cdnjs.cloudflare.com/ajax/libs/ie8/0.2.5/ie8.js"></script>
  <![endif]-->

  <!--[if lte IE 9]>
  <script src="https://cdn.auth0.com/js/base64.js"></script>
  <script src="https://cdn.auth0.com/js/es5-shim.min.js"></script>
  <![endif]-->

  <script src="https://cdn.auth0.com/js/lock/14.2.3/lock.min.js"></script>
  <script>
    // Decode utf8 characters properly
    var config = JSON.parse(decodeURIComponent(escape(window.atob('@@config@@'))));
    config.extraParams = config.extraParams || {};
    var connection = config.connection;
    var prompt = config.prompt;
    var languageDictionary;
    var language;

    if (config.dict && config.dict.signin && config.dict.signin.title) {
      languageDictionary = { title: config.dict.signin.title };
    } else if (typeof config.dict === 'string') {
      language = config.dict;
    }

    var loginHint = config.extraParams.login_hint;
    var colors = config.colors || {};

    var lock = new Auth0Lock(config.clientID, config.auth0Domain, {
      auth: {
        redirectUrl: config.callbackURL,
        responseType: (config.internalOptions || {}).response_type ||
          (config.callbackOnLocationHash ? 'token' : 'code'),
        params: config.internalOptions
      },
      configurationBaseUrl: config.clientConfigurationBaseUrl,
      overrides: {
        __tenant: config.auth0Tenant,
        __token_issuer: config.authorizationServer.issuer
      },
      assetsUrl: config.assetsUrl,
      allowedConnections: connection ? [connection] : null,
      rememberLastLogin: !prompt,
      language: language,
      languageBaseUrl: config.languageBaseUrl,
      languageDictionary: languageDictionary,
      theme: {
        logo: 'https://roradar.vercel.app/branding/roradar-mark.png',
        primaryColor: colors.primary ? colors.primary : '#2850ff'
      },
      prefill: loginHint ? { email: loginHint, username: loginHint } : null,
      closable: false,
      defaultADUsernameFromEmailPrefix: false
    });

    lock.show();
  </script>
</body>
</html>
